<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — KORONA ↔ ShipHero</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 28px 26px;
      border-top: 4px solid var(--accent);
    }
    .login-card h1 {
      margin: 0 0 6px;
      font-size: 1.25rem;
    }
    .login-card p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .login-card label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--muted);
    }
    .login-card input {
      width: 100%;
      margin-bottom: 16px;
    }
    .login-card .btn {
      width: 100%;
      padding: 11px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <form class="login-card" id="login-form">
      <h1>KORONA ↔ ShipHero</h1>
      <p>Enter the dashboard password to continue.</p>
      <label for="password">Password</label>
      <input class="input" id="password" name="password" type="password" autocomplete="current-password" required autofocus />
      <p id="login-error" class="hint" hidden></p>
      <button class="btn primary" type="submit">Sign in</button>
    </form>
  </div>
  <script>
    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("login-error");

    async function checkSession() {
      const res = await fetch("/api/auth/session");
      const data = await res.json();
      if (data.authenticated) window.location.href = "/";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      const password = document.getElementById("password").value;
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error ?? "Sign in failed";
          errorEl.hidden = false;
          return;
        }
        window.location.href = "/";
      } catch {
        errorEl.textContent = "Network error. Try again.";
        errorEl.hidden = false;
      }
    });

    checkSession();
  </script>
</body>
</html>
